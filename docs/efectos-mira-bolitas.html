<!DOCTYPE html>
<!--
  ================================================================
  EFECTOS REUTILIZABLES — ValoSense
  ================================================================
  Copia este archivo a tu proyecto y sigue las instrucciones
  de cada sección. Contiene:

    1. CSS  — Mira (crosshair cursor)
    2. CSS  — Bolitas (hero-orbs canvas)
    3. JS   — Mira (crosshair cursor)
    4. JS   — Bolitas (hero-orbs completo)

  USO RÁPIDO:
    · Pon la clase "hero" en el contenedor donde quieres las bolitas.
    · Carga este archivo como referencia; pega cada bloque donde toca.
  ================================================================
-->

<!-- ============================================================
  INSTRUCCIONES DE INTEGRACIÓN
  ============================================================

  EN TU HTML añade esto dentro del <head>:

    <link rel="stylesheet" href="efectos-valosense.css">

  Y antes del </body>:

    <script src="hero-orbs.js" defer></script>
    <script src="crosshair.js" defer></script>

  Tu sección hero debe tener la clase "hero":

    <section class="hero">
      <div class="container">  ← o "hero-content"
        <h1>Tu título</h1>
      </div>
    </section>

  Si no usas variables CSS del proyecto, sustituye:
    · var(--cyan-accent)  →  #00e0ff  (o tu color cian)
    · var(--red-primary)  →  #ff4655  (o tu color rojo)
    · var(--dur-fast)     →  0.15s
    · var(--ease-out)     →  ease-out

  ============================================================ -->




<!-- ============================================================
  BLOQUE 1 — CSS: MIRA (CROSSHAIR CURSOR)
  Pegar en tu archivo .css principal.
  ============================================================ -->
<style id="css-mira">

/* ============================================================
   Cursor personalizado · mira de Valorant
   La clase html.vs-has-crosshair la añade crosshair.js solo cuando
   activa el crosshair; así en móvil/reduced-motion el cursor
   nativo sigue vivo. Los campos editables conservan el caret.
   ============================================================ */
html.vs-has-crosshair,
html.vs-has-crosshair body,
html.vs-has-crosshair * {
    cursor: none !important;
}
html.vs-has-crosshair input:not([type="submit"]):not([type="button"]):not([type="checkbox"]):not([type="radio"]),
html.vs-has-crosshair textarea,
html.vs-has-crosshair select,
html.vs-has-crosshair [contenteditable="true"] {
    cursor: text !important;
}

#vs-crosshair {
    position: fixed;
    left: 0;
    top: 0;
    width: 0;
    height: 0;
    transform: translate(var(--cx, -100px), var(--cy, -100px));
    pointer-events: none;
    z-index: 99999;
    color: var(--cyan-accent, #00e0ff);
    transition:
        color var(--dur-fast, 0.15s) var(--ease-out, ease-out),
        opacity var(--dur-fast, 0.15s) var(--ease-out, ease-out);
    will-change: transform;
}

#vs-crosshair.is-hot {
    color: var(--red-primary, #ff4655);
}

#vs-crosshair.is-hidden {
    opacity: 0;
}

/* 4 líneas del crosshair */
.vs-ch-line {
    position: absolute;
    background: currentColor;
    box-shadow: 0 0 4px currentColor;
    transition: background var(--dur-fast, 0.15s) var(--ease-out, ease-out);
}
.vs-ch-top,
.vs-ch-bottom {
    width: 1.5px;
    height: 5px;
    left: -0.75px;
}
.vs-ch-left,
.vs-ch-right {
    height: 1.5px;
    width: 5px;
    top: -0.75px;
}
.vs-ch-top    { top:  -9px; }
.vs-ch-bottom { top:   4px; }
.vs-ch-left   { left: -9px; }
.vs-ch-right  { left:  4px; }

/* Punto central */
.vs-ch-dot {
    position: absolute;
    width: 2px;
    height: 2px;
    left: -1px;
    top: -1px;
    background: currentColor;
    border-radius: 50%;
    box-shadow: 0 0 3px currentColor;
}

/* Crece sobre elementos interactivos */
#vs-crosshair.is-hot .vs-ch-top    { top:    -12px; height: 7px; }
#vs-crosshair.is-hot .vs-ch-bottom { top:      5px; height: 7px; }
#vs-crosshair.is-hot .vs-ch-left   { left:  -12px; width:  7px; }
#vs-crosshair.is-hot .vs-ch-right  { left:    5px; width:  7px; }

/* Retroceso al pulsar (kick) */
@keyframes vs-kick-top {
    0%   { transform: translateY(0); }
    40%  { transform: translateY(-5px); }
    100% { transform: translateY(0); }
}
@keyframes vs-kick-bottom {
    0%   { transform: translateY(0); }
    40%  { transform: translateY(5px); }
    100% { transform: translateY(0); }
}
@keyframes vs-kick-left {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}
@keyframes vs-kick-right {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(5px); }
    100% { transform: translateX(0); }
}
@keyframes vs-kick-dot {
    0%   { transform: scale(1); opacity: 1; }
    30%  { transform: scale(1.6); opacity: 0.9; }
    100% { transform: scale(1); opacity: 1; }
}

#vs-crosshair.is-firing .vs-ch-top    { animation: vs-kick-top    260ms cubic-bezier(.3,.8,.3,1); }
#vs-crosshair.is-firing .vs-ch-bottom { animation: vs-kick-bottom 260ms cubic-bezier(.3,.8,.3,1); }
#vs-crosshair.is-firing .vs-ch-left   { animation: vs-kick-left   260ms cubic-bezier(.3,.8,.3,1); }
#vs-crosshair.is-firing .vs-ch-right  { animation: vs-kick-right  260ms cubic-bezier(.3,.8,.3,1); }
#vs-crosshair.is-firing .vs-ch-dot    { animation: vs-kick-dot    260ms cubic-bezier(.3,.8,.3,1); }

</style>




<!-- ============================================================
  BLOQUE 2 — CSS: BOLITAS (HERO-ORBS)
  Pegar en tu archivo .css principal.
  El hero necesita: position: relative; overflow: hidden;
  ============================================================ -->
<style id="css-bolitas">

/* El hero que contiene las bolitas */
.hero {
    position: relative;
    overflow: hidden;
    isolation: isolate;
}

/* Canvas de las bolitas — lo inyecta hero-orbs.js automáticamente */
.hero-orbs {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: block;
    pointer-events: auto;
    background: transparent;
}

/* El contenido del hero va POR ENCIMA del canvas (z-index 2) */
/* Ajusta los selectores a los que uses en tu proyecto         */
.hero > .container,
.hero > .hero-content,
.hero .hero-cta-row,
.hero .hero-stats {
    position: relative;
    z-index: 2;
}

/* Fondos decorativos van por debajo de las bolitas */
.hero > .hero-grid-bg {
    z-index: 0;
}

</style>




<!-- ============================================================
  BLOQUE 3 — JS: MIRA (CROSSHAIR CURSOR)
  Pegar en un archivo crosshair.js y cargarlo con defer,
  O incluirlo dentro de tu DOMContentLoaded principal.
  ============================================================ -->
<script id="js-mira">
(function () {
    'use strict';

    document.addEventListener('DOMContentLoaded', function () {
        var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var canHover = window.matchMedia('(hover: hover)').matches
                    && window.matchMedia('(any-pointer: fine)').matches;
        var isTouch = !canHover;

        if (!reducedMotion && !isTouch) {
            var ch = document.createElement('div');
            ch.id = 'vs-crosshair';
            ch.setAttribute('aria-hidden', 'true');
            ch.innerHTML =
                '<span class="vs-ch-line vs-ch-top"></span>' +
                '<span class="vs-ch-line vs-ch-right"></span>' +
                '<span class="vs-ch-line vs-ch-bottom"></span>' +
                '<span class="vs-ch-line vs-ch-left"></span>' +
                '<span class="vs-ch-dot"></span>';
            document.body.appendChild(ch);
            document.documentElement.classList.add('vs-has-crosshair');

            var cx = -100, cy = -100, chPending = false;
            document.addEventListener('pointermove', function (e) {
                cx = e.clientX; cy = e.clientY;
                if (chPending) return;
                chPending = true;
                requestAnimationFrame(function () {
                    ch.style.setProperty('--cx', cx + 'px');
                    ch.style.setProperty('--cy', cy + 'px');
                    chPending = false;
                });
            }, { passive: true });

            // Selectores donde la mira se pone roja — ajusta a tu proyecto
            var HOT_SELECTOR = 'a, button, [role="button"], input, textarea, select';
            document.addEventListener('pointerover', function (e) {
                var target = e.target;
                if (!(target instanceof Element)) return;
                ch.classList.toggle('is-hot', !!target.closest(HOT_SELECTOR));
            });

            // Kick al pulsar
            document.addEventListener('pointerdown', function () {
                ch.classList.remove('is-firing');
                void ch.offsetWidth; // force reflow para reiniciar keyframes
                ch.classList.add('is-firing');
            }, { passive: true });
        }
    });
})();
</script>




<!-- ============================================================
  BLOQUE 4 — JS: BOLITAS (HERO-ORBS) — ARCHIVO COMPLETO
  Guardar como hero-orbs.js y cargar con defer.
  Busca automáticamente todos los elementos con clase "hero".
  ============================================================ -->
<script id="js-bolitas">
// =====================================================
// hero-orbs.js
// Bolas flotantes tipo AimLab en el hero de cada página.
// - Velocidad lenta, rebote en bordes del hero.
// - Click rompe la bola con partículas.
// - Pausa si la pestaña no es visible.
// =====================================================

(function () {
    'use strict';

    var NUM_ORBS = 8;
    var STORAGE_KEY = 'vsOrbsBroken';

    // Colores — ajusta a tu paleta
    var COLORES = [
        { r: 255, g: 70,  b: 85  }, // rojo
        { r: 0,   g: 224, b: 255 }  // cian
    ];

    // Reset del contador al recargar página (F5)
    try {
        var navs = performance.getEntriesByType && performance.getEntriesByType('navigation');
        if (navs && navs[0] && navs[0].type === 'reload') {
            sessionStorage.removeItem(STORAGE_KEY);
        }
    } catch (_) {}

    function getRotas() {
        try {
            var n = parseInt(sessionStorage.getItem(STORAGE_KEY) || '0', 10);
            return (isNaN(n) || n < 0) ? 0 : n;
        } catch (_) { return 0; }
    }
    function incRotas() {
        try { sessionStorage.setItem(STORAGE_KEY, String(getRotas() + 1)); } catch (_) {}
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }
    function pick(a)        { return a[Math.floor(Math.random() * a.length)]; }

    function crearOrbsHero(heroEl) {
        if (heroEl.dataset.orbsInit === '1') return;
        heroEl.dataset.orbsInit = '1';

        var canvas = document.createElement('canvas');
        canvas.className = 'hero-orbs';
        canvas.setAttribute('aria-hidden', 'true');
        heroEl.appendChild(canvas);

        var ctx = canvas.getContext('2d');
        var dpr = Math.max(1, window.devicePixelRatio || 1);
        var W = 0, H = 0;

        function redimensionar() {
            var rect = heroEl.getBoundingClientRect();
            W = Math.max(100, Math.floor(rect.width));
            H = Math.max(100, Math.floor(rect.height));
            canvas.width  = W * dpr;
            canvas.height = H * dpr;
            canvas.style.width  = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        redimensionar();

        var orbs = [];
        function spawnOrb() {
            var r   = rand(10, 16);
            var v   = rand(0.22, 0.5);
            var ang = rand(0, Math.PI * 2);
            var col = pick(COLORES);
            return {
                x: rand(r, W - r), y: rand(r, H - r),
                vx: Math.cos(ang) * v, vy: Math.sin(ang) * v,
                r: r, color: col, alpha: 1
            };
        }
        var numSpawn = Math.max(0, NUM_ORBS - getRotas());
        for (var i = 0; i < numSpawn; i++) orbs.push(spawnOrb());

        var particulas = [];
        function romperOrb(orb) {
            for (var k = 0; k < 10; k++) {
                var ang = (k / 10) * Math.PI * 2 + rand(-0.1, 0.1);
                var sp  = rand(0.9, 1.8);
                particulas.push({
                    x: orb.x, y: orb.y,
                    vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
                    r: rand(1.2, 2.4), color: orb.color, life: 1
                });
            }
        }

        function coordsRelativas(e) {
            var rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function intentarRomperEn(x, y) {
            for (var i = 0; i < orbs.length; i++) {
                var o  = orbs[i];
                var dx = x - o.x, dy = y - o.y;
                if (dx * dx + dy * dy <= (o.r + 10) * (o.r + 10)) {
                    romperOrb(o);
                    orbs.splice(i, 1);
                    incRotas();
                    return true;
                }
            }
            return false;
        }

        var pulsado = false;

        heroEl.addEventListener('mousedown', function (e) {
            if (e.button !== 0) return;
            pulsado = true;
            var p = coordsRelativas(e);
            intentarRomperEn(p.x, p.y);
        }, true);

        window.addEventListener('mouseup',  function () { pulsado = false; });
        window.addEventListener('blur',     function () { pulsado = false; });

        heroEl.addEventListener('mousemove', function (e) {
            var p = coordsRelativas(e);
            if (pulsado) intentarRomperEn(p.x, p.y);

            var hover = false;
            for (var i = 0; i < orbs.length; i++) {
                var o = orbs[i];
                var dx = p.x - o.x, dy = p.y - o.y;
                if (dx * dx + dy * dy <= (o.r + 10) * (o.r + 10)) { hover = true; break; }
            }
            var enInteractivo = e.target && e.target.closest && e.target.closest('a,button,input,select,textarea,label');
            if (!enInteractivo) heroEl.style.cursor = hover ? 'crosshair' : '';
        }, true);

        heroEl.addEventListener('touchstart', function (e) {
            if (!e.touches || !e.touches.length) return;
            pulsado = true;
            var t = e.touches[0];
            var rect = canvas.getBoundingClientRect();
            intentarRomperEn(t.clientX - rect.left, t.clientY - rect.top);
        }, { passive: true, capture: true });

        heroEl.addEventListener('touchmove', function (e) {
            if (!pulsado || !e.touches || !e.touches.length) return;
            var t = e.touches[0];
            var rect = canvas.getBoundingClientRect();
            intentarRomperEn(t.clientX - rect.left, t.clientY - rect.top);
        }, { passive: true, capture: true });

        heroEl.addEventListener('touchend',    function () { pulsado = false; });
        heroEl.addEventListener('touchcancel', function () { pulsado = false; });

        var running = true;
        var lastT = performance.now();

        function tick(now) {
            if (!running) return;
            var dt = Math.min(40, now - lastT);
            lastT = now;
            ctx.clearRect(0, 0, W, H);

            for (var i = 0; i < orbs.length; i++) {
                var o = orbs[i];
                o.x += o.vx * dt;
                o.y += o.vy * dt;
                if (o.x - o.r < 0)      { o.x = o.r;     o.vx = -o.vx; }
                else if (o.x + o.r > W) { o.x = W - o.r; o.vx = -o.vx; }
                if (o.y - o.r < 0)      { o.y = o.r;     o.vy = -o.vy; }
                else if (o.y + o.r > H) { o.y = H - o.r; o.vy = -o.vy; }

                var g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r * 2.4);
                var c = o.color;
                g.addColorStop(0,   'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + (0.55 * o.alpha) + ')');
                g.addColorStop(0.5, 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + (0.18 * o.alpha) + ')');
                g.addColorStop(1,   'rgba(' + c.r + ',' + c.g + ',' + c.b + ',0)');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(o.x, o.y, o.r * 2.4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + (0.92 * o.alpha) + ')';
                ctx.beginPath();
                ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255,255,255,' + (0.35 * o.alpha) + ')';
                ctx.beginPath();
                ctx.arc(o.x - o.r * 0.35, o.y - o.r * 0.35, o.r * 0.32, 0, Math.PI * 2);
                ctx.fill();
            }

            for (var j = particulas.length - 1; j >= 0; j--) {
                var p = particulas[j];
                p.x += p.vx * dt * 0.6;
                p.y += p.vy * dt * 0.6;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= dt * 0.0016;
                if (p.life <= 0) { particulas.splice(j, 1); continue; }
                var pc = p.color;
                ctx.fillStyle = 'rgba(' + pc.r + ',' + pc.g + ',' + pc.b + ',' + p.life + ')';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                running = false;
            } else if (!running) {
                running = true;
                lastT = performance.now();
                requestAnimationFrame(tick);
            }
        });

        var ro = window.ResizeObserver ? new ResizeObserver(redimensionar) : null;
        if (ro) ro.observe(heroEl);
        else window.addEventListener('resize', redimensionar);
    }

    function init() {
        var heros = document.querySelectorAll('.hero');
        for (var i = 0; i < heros.length; i++) crearOrbsHero(heros[i]);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

</html>
